version: "3"

vars:
  COMPOSE: docker compose

tasks:
  # ── Development ────────────────────────────────────────────────────

  up:
    desc: Build and start everything (one command to rule them all)
    cmds:
      - "{{.COMPOSE}} up --build -d"
      - "{{.COMPOSE}} ps"
      - |
        echo ""
        echo "All services are running:"
        echo "  Dashboard:  http://localhost:8080"
        echo "  Grafana:    http://localhost:3010  (admin/admin)"
        echo "  TimescaleDB: localhost:5434"
        echo "  Redis:       localhost:6381"
        echo ""
        echo "  task logs    — tail all logs"
        echo "  task down    — stop everything"
        echo ""

  dev:
    desc: Same as 'up' (alias)
    cmds:
      - task: up

  dev:infra:
    desc: Start infrastructure only (TimescaleDB, Redis, Grafana)
    cmds:
      - "{{.COMPOSE}} up -d timescaledb redis grafana"

  dev:local:
    desc: Start infra + all Go services locally (one command)
    cmds:
      - task: dev:infra
      - task: dev:stop-local
      - |
        echo "Starting Go services locally..."
        mkdir -p .pids
        nohup go run ./cmd/feeder   > /tmp/ai-trader-feeder.log   2>&1 & echo $! > .pids/feeder.pid
        sleep 2
        nohup go run ./cmd/signal   > /tmp/ai-trader-signal.log   2>&1 & echo $! > .pids/signal.pid
        nohup go run ./cmd/executor > /tmp/ai-trader-executor.log 2>&1 & echo $! > .pids/executor.pid
        nohup go run ./cmd/api      > /tmp/ai-trader-api.log      2>&1 & echo $! > .pids/api.pid
        sleep 2
        echo ""
        echo "All services running:"
        echo "  Dashboard:   http://localhost:8080"
        echo "  Grafana:     http://localhost:3010  (admin/admin)"
        echo ""
        echo "  task logs:local   — tail all logs"
        echo "  task dev:stop     — stop everything"
        echo ""

  dev:stop-local:
    desc: Stop locally running Go services
    internal: true
    cmds:
      - |
        for svc in feeder signal executor api; do
          if [ -f .pids/$svc.pid ]; then
            pid=$(cat .pids/$svc.pid)
            kill $pid 2>/dev/null && echo "stopped $svc (pid $pid)" || true
            rm -f .pids/$svc.pid
          fi
        done

  down:
    desc: Stop everything (Docker containers + local Go services)
    cmds:
      - task: dev:stop-local
      - "{{.COMPOSE}} down --remove-orphans"

  restart:
    desc: Restart all Go services (keep infra running)
    cmds:
      - "{{.COMPOSE}} restart feeder signal executor api"
      - "{{.COMPOSE}} ps"

  status:
    desc: Show status of all containers
    cmds:
      - "{{.COMPOSE}} ps -a"

  # ── Testing ────────────────────────────────────────────────────────

  test:
    desc: Run all Go tests
    cmds:
      - go test ./... -v

  test:short:
    desc: Run Go tests (short mode, no -v)
    cmds:
      - go test ./...

  lint:
    desc: Run go vet
    cmds:
      - go vet ./...

  # ── Backtesting ────────────────────────────────────────────────────

  backtest:
    desc: Run Python backtest simulation
    dir: backtest
    cmds:
      - python run.py

  optimize:
    desc: Run parameter optimization grid search
    dir: backtest
    cmds:
      - python optimize.py

  # ── Logs ───────────────────────────────────────────────────────────

  logs:
    desc: Tail all service logs
    cmds:
      - "{{.COMPOSE}} logs -f --tail=50"

  logs:local:
    desc: Tail all local Go service logs
    cmds:
      - tail -f /tmp/ai-trader-feeder.log /tmp/ai-trader-signal.log /tmp/ai-trader-executor.log /tmp/ai-trader-api.log

  logs:feeder:
    desc: Tail feeder logs
    cmds:
      - "{{.COMPOSE}} logs -f feeder"

  logs:signal:
    desc: Tail signal engine logs
    cmds:
      - "{{.COMPOSE}} logs -f signal"

  logs:executor:
    desc: Tail executor logs
    cmds:
      - "{{.COMPOSE}} logs -f executor"

  logs:api:
    desc: Tail API logs
    cmds:
      - "{{.COMPOSE}} logs -f api"

  # ── Build ──────────────────────────────────────────────────────────

  build:
    desc: Build all Go binaries locally
    cmds:
      - go build -o bin/feeder   ./cmd/feeder
      - go build -o bin/signal   ./cmd/signal
      - go build -o bin/executor ./cmd/executor
      - go build -o bin/api      ./cmd/api

  build:docker:
    desc: Build the Docker image
    cmds:
      - "{{.COMPOSE}} build"

  # ── Utilities ──────────────────────────────────────────────────────

  telegram:test:
    desc: Send a test message to Telegram
    cmds:
      - |
        source .env
        if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
          echo "ERROR: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set in .env"
          exit 1
        fi
        echo "Testing Telegram bot..."
        echo "  Bot token: ${TELEGRAM_BOT_TOKEN:0:10}..."
        echo "  Chat ID:   $TELEGRAM_CHAT_ID"
        echo ""
        RESPONSE=$(curl -s -w "\n%{http_code}" \
          "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"✅ AI Trader test — Telegram is working!\"}")
        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')
        if [ "$HTTP_CODE" = "200" ]; then
          echo "SUCCESS — message sent!"
        else
          echo "FAILED (HTTP $HTTP_CODE)"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
        fi

  psql:
    desc: Open a psql shell to TimescaleDB
    cmds:
      - "{{.COMPOSE}} exec timescaledb psql -U trader -d trader"

  redis-cli:
    desc: Open a redis-cli shell
    cmds:
      - "{{.COMPOSE}} exec redis redis-cli"

  # ── Data management ─────────────────────────────────────────────────

  db:stats:
    desc: Show table sizes, chunk counts, and compression stats
    cmds:
      - |
        {{.COMPOSE}} exec timescaledb psql -U trader -d trader -c "
          SELECT hypertable_name,
                 pg_size_pretty(hypertable_size(format('%I', hypertable_name)::regclass)) AS total_size,
                 pg_size_pretty(pg_total_relation_size(format('%I', hypertable_name)::regclass) -
                                hypertable_size(format('%I', hypertable_name)::regclass)) AS index_size
          FROM timescaledb_information.hypertables
          ORDER BY hypertable_name;
        " -c "
          SELECT hypertable_name,
                 count(*) AS chunks,
                 count(*) FILTER (WHERE is_compressed) AS compressed
          FROM timescaledb_information.chunks
          GROUP BY hypertable_name
          ORDER BY hypertable_name;
        " -c "
          SELECT 'candles' AS tbl, count(*) FROM candles
          UNION ALL
          SELECT 'signals', count(*) FROM signals
          UNION ALL
          SELECT 'trades', count(*) FROM trades;
        "

  db:retention:
    desc: Manually drop old chunks (candles >60d, signals >180d)
    cmds:
      - |
        {{.COMPOSE}} exec timescaledb psql -U trader -d trader -c "
          SELECT drop_chunks('candles',  older_than => INTERVAL '60 days');
          SELECT drop_chunks('signals',  older_than => INTERVAL '180 days');
        "

  db:compress:
    desc: Manually compress chunks older than 7 days
    cmds:
      - |
        {{.COMPOSE}} exec timescaledb psql -U trader -d trader -c "
          SELECT compress_chunk(c.chunk_name)
          FROM timescaledb_information.chunks c
          WHERE c.hypertable_name IN ('candles', 'signals')
            AND NOT c.is_compressed
            AND c.range_end < now() - INTERVAL '7 days';
        "

  db:purge:
    desc: Delete ALL data from candles, signals, and trades (destructive!)
    prompt: "This will delete ALL trading data. Are you sure?"
    cmds:
      - |
        {{.COMPOSE}} exec timescaledb psql -U trader -d trader -c "
          TRUNCATE candles, signals, trades;
        "
