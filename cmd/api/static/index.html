<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trader Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  h1 { font-size: 20px; margin-bottom: 16px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card h3 {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card .value {
    font-size: 24px;
    font-weight: 600;
  }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral { color: var(--muted); }
  #chart-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 16px;
  }
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 8px;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 8px;
    border-bottom: 1px solid var(--border);
  }
  .badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-buy { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-sell { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-hold { background: rgba(139,148,158,0.15); color: var(--muted); }
  .refresh-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .refresh-bar span { color: var(--muted); font-size: 13px; }
  button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { border-color: var(--blue); }
  .indicator-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .indicator-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .indicator-card h3 {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .indicator-card .value { font-size: 20px; font-weight: 600; }
  .indicator-card .label { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
<div class="refresh-bar">
  <h1>AI Trader Dashboard</h1>
  <div>
    <span id="last-update">Loading...</span>
    <button onclick="loadAll()">Refresh</button>
  </div>
</div>

<!-- Stats cards -->
<div class="grid" id="stats-grid">
  <div class="card"><h3>Portfolio</h3><div class="value" id="stat-portfolio">--</div></div>
  <div class="card"><h3>BTC Position</h3><div class="value" id="stat-btc">--</div></div>
  <div class="card"><h3>Total P&L</h3><div class="value" id="stat-pnl">--</div></div>
  <div class="card"><h3>Win Rate</h3><div class="value" id="stat-winrate">--</div></div>
</div>

<!-- Latest indicators -->
<div class="indicator-row">
  <div class="indicator-card">
    <h3>RSI (14)</h3>
    <div class="value" id="ind-rsi">--</div>
    <div class="label" id="ind-rsi-label">--</div>
  </div>
  <div class="indicator-card">
    <h3>MACD Histogram</h3>
    <div class="value" id="ind-macd">--</div>
    <div class="label" id="ind-macd-label">--</div>
  </div>
  <div class="indicator-card">
    <h3>Sentiment</h3>
    <div class="value" id="ind-sent">--</div>
    <div class="label" id="ind-sent-label">--</div>
  </div>
</div>

<!-- Price chart -->
<div id="chart-container"></div>

<!-- Tables -->
<div class="two-col">
  <div class="card">
    <h3>Recent Signals</h3>
    <table>
      <thead><tr><th>Time</th><th>Action</th><th>Score</th><th>RSI</th><th>Sent</th></tr></thead>
      <tbody id="signals-body"></tbody>
    </table>
  </div>
  <div class="card">
    <h3>Trades</h3>
    <table>
      <thead><tr><th>Time</th><th>Action</th><th>Price</th><th>Qty</th><th>Status</th><th>P&L</th></tr></thead>
      <tbody id="trades-body"></tbody>
    </table>
  </div>
</div>

<script>
const API = '';
let chart, candleSeries, volumeSeries;

function initChart() {
  const container = document.getElementById('chart-container');
  chart = LightweightCharts.createChart(container, {
    width: container.clientWidth - 16,
    height: 400,
    layout: { background: { color: '#161b22' }, textColor: '#8b949e' },
    grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    timeScale: { timeVisible: true, secondsVisible: false },
  });
  candleSeries = chart.addCandlestickSeries({
    upColor: '#3fb950', downColor: '#f85149',
    borderUpColor: '#3fb950', borderDownColor: '#f85149',
    wickUpColor: '#3fb950', wickDownColor: '#f85149',
  });
  volumeSeries = chart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
  });
  chart.priceScale('vol').applyOptions({
    scaleMargins: { top: 0.85, bottom: 0 },
  });
  window.addEventListener('resize', () => {
    chart.applyOptions({ width: container.clientWidth - 16 });
  });
}

async function fetchJSON(url) {
  const res = await fetch(url);
  return res.json();
}

async function loadPosition() {
  try {
    const pos = await fetchJSON(API + '/api/position');
    document.getElementById('stat-portfolio').textContent = '$' + pos.total_usdt.toFixed(2);
    document.getElementById('stat-btc').textContent = pos.btc.toFixed(5) + ' BTC';
    document.getElementById('stat-btc').className = 'value ' + (pos.btc > 0 ? 'positive' : 'neutral');
  } catch (e) {
    console.error('position error:', e);
  }
}

async function loadStats() {
  try {
    const s = await fetchJSON(API + '/api/stats');
    const pnlEl = document.getElementById('stat-pnl');
    pnlEl.textContent = (s.total_pnl >= 0 ? '+' : '') + '$' + s.total_pnl.toFixed(2);
    pnlEl.className = 'value ' + (s.total_pnl >= 0 ? 'positive' : 'negative');
    document.getElementById('stat-winrate').textContent =
      s.total_trades > 0 ? s.win_rate.toFixed(1) + '%' : 'N/A';
  } catch (e) {
    console.error('stats error:', e);
  }
}

async function loadCandles() {
  try {
    const candles = await fetchJSON(API + '/api/candles?interval=15m&limit=200');
    if (!candles || candles.length === 0) return;
    const ohlc = candles.map(c => ({
      time: Math.floor(new Date(c.time).getTime() / 1000),
      open: c.open, high: c.high, low: c.low, close: c.close,
    }));
    const vol = candles.map(c => ({
      time: Math.floor(new Date(c.time).getTime() / 1000),
      value: c.volume,
      color: c.close >= c.open ? 'rgba(63,185,80,0.3)' : 'rgba(248,81,73,0.3)',
    }));
    candleSeries.setData(ohlc);
    volumeSeries.setData(vol);
  } catch (e) {
    console.error('candles error:', e);
  }
}

async function loadSignals() {
  try {
    const signals = await fetchJSON(API + '/api/signals?limit=20');
    const tbody = document.getElementById('signals-body');
    tbody.innerHTML = '';
    if (!signals) return;
    // Update indicator cards from latest signal.
    const latest = signals[0];
    if (latest) {
      const rsiEl = document.getElementById('ind-rsi');
      rsiEl.textContent = latest.rsi.toFixed(1);
      rsiEl.className = 'value ' + (latest.rsi < 30 ? 'positive' : latest.rsi > 70 ? 'negative' : 'neutral');
      document.getElementById('ind-rsi-label').textContent =
        latest.rsi < 30 ? 'Oversold' : latest.rsi > 70 ? 'Overbought' : 'Neutral';

      const macdEl = document.getElementById('ind-macd');
      macdEl.textContent = latest.macd.toFixed(2);
      macdEl.className = 'value ' + (latest.macd > 0 ? 'positive' : 'negative');
      document.getElementById('ind-macd-label').textContent =
        latest.macd > 0 ? 'Bullish' : 'Bearish';

      const sentEl = document.getElementById('ind-sent');
      sentEl.textContent = latest.sentiment;
      sentEl.className = 'value ' + (latest.sentiment > 0 ? 'positive' : latest.sentiment < 0 ? 'negative' : 'neutral');
      document.getElementById('ind-sent-label').textContent =
        latest.sentiment > 0 ? 'Bullish' : latest.sentiment < 0 ? 'Bearish' : 'Neutral';
    }
    signals.forEach(s => {
      const tr = document.createElement('tr');
      const badge = s.action === 'BUY' ? 'badge-buy' : s.action === 'SELL' ? 'badge-sell' : 'badge-hold';
      tr.innerHTML = `
        <td>${new Date(s.time).toLocaleTimeString()}</td>
        <td><span class="badge ${badge}">${s.action}</span></td>
        <td>${s.score.toFixed(2)}</td>
        <td>${s.rsi.toFixed(1)}</td>
        <td>${s.sentiment}</td>`;
      tbody.appendChild(tr);
    });
  } catch (e) {
    console.error('signals error:', e);
  }
}

async function loadTrades() {
  try {
    const trades = await fetchJSON(API + '/api/trades?limit=20');
    const tbody = document.getElementById('trades-body');
    tbody.innerHTML = '';
    if (!trades) return;
    trades.forEach(t => {
      const tr = document.createElement('tr');
      const badge = t.action === 'BUY' ? 'badge-buy' : 'badge-sell';
      const pnlClass = t.pnl > 0 ? 'positive' : t.pnl < 0 ? 'negative' : '';
      tr.innerHTML = `
        <td>${new Date(t.time).toLocaleTimeString()}</td>
        <td><span class="badge ${badge}">${t.action}</span></td>
        <td>$${t.entry_price.toFixed(2)}</td>
        <td>${t.quantity.toFixed(5)}</td>
        <td>${t.status}</td>
        <td class="${pnlClass}">${t.pnl !== 0 ? (t.pnl > 0 ? '+' : '') + '$' + t.pnl.toFixed(2) : '--'}</td>`;
      tbody.appendChild(tr);
    });
  } catch (e) {
    console.error('trades error:', e);
  }
}

async function loadAll() {
  await Promise.all([loadPosition(), loadStats(), loadCandles(), loadSignals(), loadTrades()]);
  document.getElementById('last-update').textContent = 'Updated: ' + new Date().toLocaleTimeString();
}

initChart();
loadAll();
// Auto-refresh every 60 seconds.
setInterval(loadAll, 60000);
</script>
</body>
</html>
